name: Upload example review to GCS

on:
  workflow_dispatch:

# Repository variable (Settings → Secrets and variables → Actions → Variables):
#   Name:  book-review-storage
#   Value: bucket name only, e.g. project-f40bc29e-c7cd-4098-b50-book-reviews (no gs://)
#
# Secret: GCP_SA_KEY — service account JSON with permission to write objects to that bucket

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      # Map repo variable book-review-storage → shell-safe name (hyphens break $ expansion in bash)
      BOOK_REVIEW_STORAGE: ${{ vars['book-review-storage'] }}
    steps:
      - uses: actions/checkout@v4

      - name: Check bucket variable
        run: |
          if [ -z "$BOOK_REVIEW_STORAGE" ]; then
            echo "::error::Set Actions variable book-review-storage to your GCS bucket name (no gs:// prefix)."
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload example review to incoming/
        run: gcloud storage cp templates/example-review.md "gs://${BOOK_REVIEW_STORAGE}/incoming/"
